version: '3.8'

services:
  # ── Neo4j (Graph RAG) ────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.12.0
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── PostgreSQL (Conversational Memory) ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=memorydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d memorydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - POSTGRES_CONNECTION_STRING=postgresql://raguser:ragpassword@postgres:5432/memorydb
    volumes:
      - ./api:/app
      - ./data:/app/data
      - chroma_data:/app/data/chroma_db
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rag_network

  # ── Streamlit UI ─────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./ui:/app
    depends_on:
      - api
    networks:
      - rag_network

volumes:
  neo4j_data:
  postgres_data:
  chroma_data:

networks:
  rag_network:
    driver: bridge
